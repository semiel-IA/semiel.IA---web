<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- Seguridad: la meta Content-Security-Policy se inyecta SOLO en el build de
         producción (ver cspPlugin en vite.config.js), para no romper el HMR de Vite
         en desarrollo. En hostings con cabeceras (Netlify/Cloudflare) manda public/_headers. -->
    <!-- No enviar la URL completa como Referer a sitios externos -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tipografía: Iceberg (titulares) + Chakra Petch (cuerpo). Se carga aquí
         y no vía @import en CSS para que el navegador la descubra antes. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Iceberg&display=swap"
      rel="stylesheet"
    />
    <meta name="description" content="Automatizo los procesos de tu empresa para que la IA trabaje por tu negocio: automatizaciones, agentes de IA, chatbots, webs, apps y software a medida. En español." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="Semiel.IA" />
    <meta property="og:title" content="Jose Mejía · Semiel.IA — Automatiza tu negocio con IA" />
    <meta property="og:description" content="Automatizo los procesos de tu empresa para que la IA trabaje por tu negocio. Agentes de IA, chatbots, webs, apps y software a medida. En español." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jose Mejía · Semiel.IA — Automatiza tu negocio con IA" />
    <meta name="twitter:description" content="Automatizo los procesos de tu empresa para que la IA trabaje por tu negocio. En español." />

    <title>Jose Mejía · Semiel.IA — Automatiza tu negocio con IA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
